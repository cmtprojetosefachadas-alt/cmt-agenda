<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMT — Agenda de Instalações</title>
<meta name="theme-color" content="#d4541a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="CMT Agenda">
<link rel="manifest" id="manifestLink">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f0ede8; --surface:#ffffff; --surface2:#faf9f7; --border:#e2ddd7;
    --text:#1a1714; --text2:#6b6560; --text3:#9c9690;
    --accent:#d4541a; --accent-light:#fdeee6;
    --status-ag:#2563eb; --status-ag-bg:#eff6ff;
    --status-em:#d97706; --status-em-bg:#fffbeb;
    --status-ok:#16a34a; --status-ok-bg:#f0fdf4;
    --status-at:#dc2626; --status-at-bg:#fef2f2;
    --status-mn:#7c3aed; --status-mn-bg:#f5f3ff;
    --status-ps:#0891b2; --status-ps-bg:#ecfeff;
    --status-vt:#b45309; --status-vt-bg:#fef9c3;
    --weekend-bg:#fff5f5;
    --shadow:0 1px 3px rgba(0,0,0,.07),0 4px 12px rgba(0,0,0,.05);
    --shadow-lg:0 8px 32px rgba(0,0,0,.10); --radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  #syncBar{display:none;position:fixed;top:0;left:0;right:0;height:3px;background:var(--border);z-index:9999;}
  #syncBar.show{display:block;}
  #syncFill{height:100%;width:0%;background:var(--accent);transition:width .4s;border-radius:0 2px 2px 0;animation:syncPulse 1.2s ease-in-out infinite;}
  @keyframes syncPulse{0%,100%{opacity:1}50%{opacity:.5}}

  #onlineChip{position:fixed;bottom:16px;right:16px;padding:6px 12px;border-radius:20px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:5px;box-shadow:var(--shadow-lg);z-index:500;transition:all .3s;}
  #onlineChip.online{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;}
  #onlineChip.offline{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;}
  #onlineDot{width:7px;height:7px;border-radius:50%;}
  #onlineChip.online #onlineDot{background:#16a34a;}
  #onlineChip.offline #onlineDot{background:#dc2626;}

  #loadingScreen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9000;gap:16px;}
  #loadingScreen.hide{display:none;}
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  #loadingText{font-size:13px;font-weight:500;color:var(--text3);}

  #alertBanner{display:none;position:fixed;top:60px;left:0;right:0;z-index:400;padding:8px 16px;pointer-events:none;}
  #alertBanner.show{display:block;}
  .alert-card{background:#fffbeb;border:1.5px solid #f59e0b;border-radius:12px;padding:12px 16px;margin:4px auto;max-width:640px;box-shadow:var(--shadow-lg);pointer-events:all;display:flex;align-items:center;gap:12px;animation:slideDown .3s ease;}
  .alert-card.vencido{background:#fef2f2;border-color:#ef4444;}
  @keyframes slideDown{from{transform:translateY(-8px);opacity:0}to{transform:translateY(0);opacity:1}}
  .alert-body{flex:1;}
  .alert-title{font-size:12px;font-weight:700;color:#92400e;margin-bottom:1px;}
  .alert-card.vencido .alert-title{color:#991b1b;}
  .alert-text{font-size:11px;color:var(--text2);line-height:1.4;}
  .alert-close{background:none;border:none;font-size:14px;cursor:pointer;color:var(--text3);padding:0 2px;}
  .alert-action{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:5px 10px;font-family:'Sora',sans-serif;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;}

  header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;box-shadow:0 1px 0 var(--border);}
  .logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px;letter-spacing:-.3px;}
  .logo-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;}
  .logo span{color:var(--text2);font-weight:400;}
  .header-right{display:flex;align-items:center;gap:12px;}
  .view-tabs{display:flex;background:var(--bg);border-radius:8px;padding:3px;gap:2px;}
  .view-tab{padding:5px 14px;border-radius:6px;border:none;background:transparent;font-family:'Sora',sans-serif;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;}
  .view-tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1);}
  .btn-new{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-family:'Sora',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s;}
  .btn-new:hover{background:#b8450f;transform:translateY(-1px);}

  .toolbar{padding:12px 24px;display:flex;align-items:center;gap:12px;background:var(--surface2);border-bottom:1px solid var(--border);flex-wrap:wrap;}
  .nav-arrow{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .12s;color:var(--text2);}
  .nav-arrow:hover{background:var(--bg);color:var(--text);}
  .period-label{font-size:15px;font-weight:600;min-width:180px;text-align:center;letter-spacing:-.2px;}
  .today-btn{padding:6px 12px;border-radius:7px;border:1px solid var(--border);background:var(--surface);font-family:'Sora',sans-serif;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .12s;}
  .today-btn:hover{color:var(--accent);border-color:var(--accent);}
  .toolbar-right{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .filter-select{padding:6px 10px;border-radius:7px;border:1px solid var(--border);background:var(--surface);font-family:'Sora',sans-serif;font-size:12px;color:var(--text2);cursor:pointer;}

  main{padding:16px 24px;}

  /* ── WEEK VIEW ── */
  .week-wrapper{display:flex;gap:0;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:var(--surface);}

  .time-col{width:52px;flex-shrink:0;border-right:1px solid var(--border);background:var(--surface2);}
  .time-col-header{height:56px;border-bottom:1px solid var(--border);}
  .time-slot-label{height:56px;display:flex;align-items:flex-start;justify-content:flex-end;padding:4px 6px 0 0;font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text3);border-bottom:1px solid var(--border);}

  .week-cols{display:grid;grid-template-columns:repeat(7,1fr);flex:1;min-width:0;}

  .day-col{border-right:1px solid var(--border);min-width:0;overflow:hidden;}
  .day-col:last-child{border-right:none;}
  .day-col.today .day-header{background:var(--accent-light);}
  .day-col.today .day-num{color:var(--accent);}
  .day-col.weekend{background:var(--weekend-bg);}
  .day-col.feriado{background:var(--weekend-bg);}

  .day-header{padding:8px 6px 6px;border-bottom:1px solid var(--border);text-align:center;height:56px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .day-name{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);}
  .day-num{font-size:18px;font-weight:700;letter-spacing:-.5px;line-height:1.2;}
  .feriado-label{font-size:8px;color:#dc2626;font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-top:1px;}

  .day-slots{position:relative;}
  .hour-slot{height:56px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
  .hour-slot:hover{background:var(--accent-light);}
  .day-col.weekend .hour-slot{background:rgba(220,38,38,.03);}
  .day-col.weekend .hour-slot:hover{background:rgba(220,38,38,.08);}

  .day-cards-overlay{padding:4px;display:flex;flex-direction:column;gap:4px;}

  /* ── MONTH VIEW ── */
  .month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .month-day-header{text-align:center;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);padding:8px 0;}
  .month-cell{background:var(--surface);border:1px solid var(--border);border-radius:8px;min-height:90px;padding:6px;transition:box-shadow .12s;cursor:pointer;}
  .month-cell:hover{box-shadow:var(--shadow);}
  .month-cell.today{border-color:var(--accent);}
  .month-cell.other-month{background:var(--bg);opacity:.5;}
  .month-cell.weekend{background:var(--weekend-bg);}
  .month-cell.feriado{background:var(--weekend-bg);}
  .month-cell-num{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:3px;display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
  .month-cell.today .month-cell-num{color:var(--accent);}
  .today-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;flex-shrink:0;}
  .feriado-tag{font-size:8px;color:#dc2626;font-weight:700;background:#fef2f2;border-radius:3px;padding:1px 4px;}

  /* ── YEAR VIEW ── */
  .year-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
  .mini-month{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:14px;}
  .mini-month-title{font-size:13px;font-weight:700;margin-bottom:10px;letter-spacing:-.2px;display:flex;justify-content:space-between;align-items:center;}
  .mini-month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;font-size:10px;font-family:'JetBrains Mono',monospace;}
  .mini-day-name{text-align:center;color:var(--text3);font-weight:500;padding:2px 0;}
  .mini-day{text-align:center;padding:3px 1px;border-radius:4px;cursor:pointer;color:var(--text2);transition:all .1s;position:relative;}
  .mini-day:hover{background:var(--bg);}
  .mini-day.has-event{font-weight:700;color:var(--accent);}
  .mini-day.today-mini{background:var(--accent);color:#fff;}
  .mini-day.other{color:var(--text3);}
  .mini-day.weekend-mini{color:#dc2626;opacity:.7;}
  .mini-day.today-mini.weekend-mini{color:#fff;opacity:1;}

  /* ── CARDS ── */
  .card{border-radius:7px;padding:6px 8px;border-left:3px solid;cursor:pointer;position:relative;transition:all .12s;font-size:11px;}
  .card:hover{transform:translateX(2px);box-shadow:var(--shadow);}
  .card.ag{background:var(--status-ag-bg);border-color:var(--status-ag);}
  .card.em{background:var(--status-em-bg);border-color:var(--status-em);}
  .card.ok{background:var(--status-ok-bg);border-color:var(--status-ok);}
  .card.at{background:var(--status-at-bg);border-color:var(--status-at);}
  .card.mn{background:var(--status-mn-bg);border-color:var(--status-mn);}
  .card.ps{background:var(--status-ps-bg);border-color:var(--status-ps);}
  .card.vt{background:var(--status-vt-bg);border-color:var(--status-vt);}
  .card-name{font-weight:600;line-height:1.3;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .card-time{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text3);margin-bottom:2px;}
  .card-meta{display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
  .card-badge{display:inline-block;font-size:9px;font-weight:600;padding:1px 5px;border-radius:3px;text-transform:uppercase;letter-spacing:.3px;}
  .card.ag .card-badge{background:var(--status-ag);color:#fff;}
  .card.em .card-badge{background:var(--status-em);color:#fff;}
  .card.ok .card-badge{background:var(--status-ok);color:#fff;}
  .card.at .card-badge{background:var(--status-at);color:#fff;}
  .card.mn .card-badge{background:var(--status-mn);color:#fff;}
  .card.ps .card-badge{background:var(--status-ps);color:#fff;}
  .card.vt .card-badge{background:var(--status-vt);color:#fff;}
  .card-type-badge{font-size:9px;font-weight:600;padding:1px 5px;border-radius:3px;background:rgba(0,0,0,.07);color:var(--text2);}
  .card-obs-icon{position:absolute;top:6px;right:6px;font-size:11px;opacity:.5;}
  .progress-bar{height:2px;background:var(--border);border-radius:2px;margin-top:4px;overflow:hidden;}
  .progress-fill{height:100%;border-radius:2px;}
  .card.ag .progress-fill{background:var(--status-ag);}
  .card.em .progress-fill{background:var(--status-em);}
  .card.ok .progress-fill{background:var(--status-ok);}
  .card.at .progress-fill{background:var(--status-at);}
  .card.mn .progress-fill{background:var(--status-mn);}
  .card.ps .progress-fill{background:var(--status-ps);}
  .card.vt .progress-fill{background:var(--status-vt);}

  .mini-card{font-size:10px;padding:2px 5px;border-radius:4px;border-left:2px solid;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;font-weight:500;}
  .mini-card.ag{background:var(--status-ag-bg);border-color:var(--status-ag);color:var(--status-ag);}
  .mini-card.em{background:var(--status-em-bg);border-color:var(--status-em);color:var(--status-em);}
  .mini-card.ok{background:var(--status-ok-bg);border-color:var(--status-ok);color:var(--status-ok);}
  .mini-card.at{background:var(--status-at-bg);border-color:var(--status-at);color:var(--status-at);}
  .mini-card.mn{background:var(--status-mn-bg);border-color:var(--status-mn);color:var(--status-mn);}
  .mini-card.ps{background:var(--status-ps-bg);border-color:var(--status-ps);color:var(--status-ps);}
  .mini-card.vt{background:var(--status-vt-bg);border-color:var(--status-vt);color:var(--status-vt);}

  /* TOOLTIP */
  .tooltip{display:none;position:fixed;background:var(--text);color:#fff;border-radius:10px;padding:10px 12px;font-size:12px;max-width:220px;line-height:1.5;z-index:999;box-shadow:var(--shadow-lg);pointer-events:none;}
  .tooltip.show{display:block;}

  /* LEGEND */
  .legend{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
  .legend-item{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:500;color:var(--text2);}
  .legend-dot{width:8px;height:8px;border-radius:2px;}

  .empty-day{text-align:center;padding:20px 8px;color:var(--text3);font-size:11px;}

  .counter-chip{background:var(--accent-light);color:var(--accent);border-radius:20px;padding:2px 8px;font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;}

  /* MODAL */
  .overlay{display:none;position:fixed;inset:0;background:rgba(26,23,20,.4);backdrop-filter:blur(3px);z-index:200;align-items:center;justify-content:center;}
  .overlay.show{display:flex;}
  .modal{background:var(--surface);border-radius:16px;padding:28px;width:500px;max-width:96vw;box-shadow:var(--shadow-lg);animation:pop .2s cubic-bezier(.34,1.56,.64,1);max-height:90vh;overflow-y:auto;}
  @keyframes pop{from{transform:scale(.9) translateY(10px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
  .modal-title{font-size:17px;font-weight:700;letter-spacing:-.3px;margin-bottom:18px;}
  .form-group{margin-bottom:14px;}
  label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px;}
  input,textarea,select{width:100%;padding:9px 12px;border-radius:8px;border:1.5px solid var(--border);font-family:'Sora',sans-serif;font-size:13px;background:var(--bg);color:var(--text);transition:border .15s;outline:none;}
  input:focus,textarea:focus,select:focus{border-color:var(--accent);background:#fff;}
  textarea{resize:vertical;min-height:70px;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
  .modal-actions{display:flex;gap:10px;margin-top:18px;justify-content:flex-end;}
  .btn-cancel{padding:8px 16px;border-radius:8px;border:1.5px solid var(--border);background:transparent;font-family:'Sora',sans-serif;font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);}
  .btn-cancel:hover{background:var(--bg);}
  .btn-save{padding:8px 20px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-family:'Sora',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
  .btn-save:hover{background:#b8450f;}
  .btn-delete{padding:8px 14px;border-radius:8px;border:1.5px solid #dc2626;background:transparent;color:#dc2626;font-family:'Sora',sans-serif;font-size:13px;font-weight:500;cursor:pointer;margin-right:auto;}
  .btn-delete:hover{background:#fef2f2;}

  /* TYPE TOGGLE */
  .type-toggle{display:flex;gap:6px;margin-bottom:14px;}
  .type-btn{flex:1;padding:8px;border-radius:8px;border:1.5px solid var(--border);background:transparent;font-family:'Sora',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--text2);}
  .type-btn.active-inst{background:var(--accent-light);border-color:var(--accent);color:var(--accent);}
  .type-btn.active-ps{background:#ecfeff;border-color:#0891b2;color:#0891b2;}
  .type-btn.active-vt{background:#fef9c3;border-color:#b45309;color:#b45309;}


  /* ── TAREFAS ── */
  #tarefasSection{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);margin-top:16px;overflow:hidden;box-shadow:var(--shadow);}
  .tarefas-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#1e293b 0%,#334155 100%);}
  .tarefas-title{font-size:14px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px;letter-spacing:-.2px;}
  .tarefas-badge{background:rgba(255,255,255,.2);color:#fff;border-radius:20px;padding:2px 8px;font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;}
  .tarefas-input-row{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;gap:8px;background:var(--surface2);}
  .tarefas-input{flex:1;padding:9px 14px;border-radius:9px;border:1.5px solid var(--border);font-family:'Sora',sans-serif;font-size:13px;background:#fff;color:var(--text);outline:none;transition:border .15s;}
  .tarefas-input:focus{border-color:#334155;}
  .tarefas-add-btn{padding:9px 16px;border-radius:9px;border:none;background:#1e293b;color:#fff;font-family:'Sora',sans-serif;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .15s;}
  .tarefas-add-btn:hover{background:#334155;}
  .tarefas-list{padding:8px 12px;max-height:320px;overflow-y:auto;}
  .tarefas-list:empty::after{content:'Nenhuma tarefa ainda. Adicione acima!';display:block;text-align:center;color:var(--text3);font-size:12px;padding:20px;}
  .tarefa-item{display:flex;align-items:flex-start;gap:10px;padding:10px 6px;border-bottom:1px solid var(--border);transition:background .1s;border-radius:6px;}
  .tarefa-item:last-child{border-bottom:none;}
  .tarefa-item:hover{background:var(--bg);}
  .tarefa-check{width:18px;height:18px;flex-shrink:0;cursor:pointer;accent-color:#1e293b;margin-top:2px;}
  .tarefa-body{flex:1;min-width:0;}
  .tarefa-texto{font-size:13px;font-weight:500;color:var(--text);line-height:1.4;transition:all .2s;}
  .tarefa-data{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text3);margin-top:2px;}
  .tarefa-item.done .tarefa-texto{text-decoration:line-through;color:var(--text3);}
  .tarefa-item.done .tarefa-check{opacity:.5;}
  .tarefas-footer{padding:8px 16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--surface2);}
  .tarefas-count{font-size:11px;color:var(--text3);font-weight:500;}
  .tarefas-filter{display:flex;gap:4px;}
  .tf-btn{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;font-family:'Sora',sans-serif;font-size:11px;font-weight:500;cursor:pointer;color:var(--text2);transition:all .12s;}
  .tf-btn.active{background:#1e293b;color:#fff;border-color:#1e293b;}

  @media(max-width:900px){
    .week-cols{grid-template-columns:repeat(4,1fr);}
    .year-grid{grid-template-columns:repeat(2,1fr);}
    header{padding:0 12px;}
    .logo span{display:none;}
    .period-label{min-width:120px;font-size:13px;}
    main{padding:12px;}
    .toolbar{padding:10px 12px;gap:8px;}
    .legend{display:none;}
  }
  @media(max-width:600px){
    .week-cols{grid-template-columns:repeat(3,1fr);}

// ── FERIADOS NACIONAIS — CÁLCULO AUTOMÁTICO PARA QUALQUER ANO ──

// Algoritmo de Meeus/Jones/Butcher para calcular a Páscoa
function calcPascoa(y){
  const a=y%19, b=Math.floor(y/100), c=y%100;
  const d=Math.floor(b/4), e=b%4, f=Math.floor((b+8)/25);
  const g=Math.floor((b-f+1)/3), h=(19*a+b-d-g+15)%30;
  const i=Math.floor(c/4), k=c%4, l=(32+2*e+2*i-h-k)%7;
  const m=Math.floor((a+11*h+22*l)/451);
  const month=Math.floor((h+l-7*m+114)/31);
  const day=((h+l-7*m+114)%31)+1;
  return new Date(y, month-1, day);
}

function addD(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function iso(d){return d.toISOString().slice(0,10);}

function buildFeriados(y){
  const pascoa = calcPascoa(y);
  const sextaSanta = addD(pascoa,-2);       // Sexta-feira Santa
  const carnaval1  = addD(pascoa,-48);      // Segunda de Carnaval
  const carnaval2  = addD(pascoa,-47);      // Terça de Carnaval
  const corpusChristi = addD(pascoa,60);    // Corpus Christi

  const f = new Set([
    `${y}-01-01`,   // Ano Novo
    iso(carnaval1), // Carnaval seg
    iso(carnaval2), // Carnaval ter
    iso(sextaSanta),// Sexta Santa
    iso(pascoa),    // Páscoa
    `${y}-04-21`,   // Tiradentes
    `${y}-05-01`,   // Dia do Trabalho
    iso(corpusChristi), // Corpus Christi
    `${y}-09-07`,   // Independência
    `${y}-10-12`,   // N.Sra.Aparecida
    `${y}-11-02`,   // Finados
    `${y}-11-15`,   // Proclamação da República
    `${y}-11-20`,   // Consciência Negra
    `${y}-12-25`,   // Natal
  ]);
  return f;
}

// Cache para não recalcular toda hora
const _feriadosCache = {};
function getFeriados(y){
  if(!_feriadosCache[y]) _feriadosCache[y] = buildFeriados(y);
  return _feriadosCache[y];
}

const FERIADOS_NOMES_FIXOS = {
  '01-01':'Ano Novo','04-21':'Tiradentes','05-01':'Dia do Trabalho',
  '09-07':'Independência','10-12':'N.Sra.Aparecida','11-02':'Finados',
  '11-15':'Proclamação','11-20':'Consciência Negra','12-25':'Natal'
};
function getFeriadoNome(dateStr){
  const y = parseInt(dateStr.slice(0,4));
  const pascoa = calcPascoa(y);
  const checks = {
    [iso(addD(pascoa,-48))]:'Carnaval',
    [iso(addD(pascoa,-47))]:'Carnaval',
    [iso(addD(pascoa,-2))]:'Sexta Santa',
    [iso(pascoa)]:'Páscoa',
    [iso(addD(pascoa,60))]:'Corpus Christi',
  };
  return checks[dateStr] || FERIADOS_NOMES_FIXOS[dateStr.slice(5)] || 'Feriado';
}

function isFeriado(d){
  const s=isoDate(d);
  return getFeriados(d.getFullYear()).has(s);
}
function isWeekend(d){return d.getDay()===0||d.getDay()===6;}
function isDiaEspecial(d){return isWeekend(d)||isFeriado(d);}

// ── HORÁRIOS ──
const HORAS = [];
for(let h=6;h<=22;h++) HORAS.push(`${String(h).padStart(2,'0')}:00`);

function populateHoras(){
  ['fHoraInicio','fHoraFim'].forEach(id=>{

// ── TIPO (instalação vs pessoal) ──
window._tipo = 'inst';
window.setTipo = function(t){

};

// data
window._items=[];
window._editingId=null;

const colRef=collection(db,'instalacoes');
onSnapshot(colRef,snap=>{

// utils
const today=new Date(); today.setHours(0,0,0,0);
function fmtDate(d){return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});}
function parseDate(s){if(!s)return null;const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function isoDate(d){return d.toISOString().slice(0,10);}
function startOfWeek(d){const r=new Date(d);r.setHours(0,0,0,0);r.setDate(r.getDate()-r.getDay());return r;}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function sameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function statusLabel(s){return{ag:'Agendado',em:'Em andamento',ok:'Concluído',at:'Atrasado',mn:'Manutenção',ps:'Pessoal',vt:'Visita Técnica'}[s]||s;}
function calcProgress(it){
  const s=parseDate(it.inicio),e=parseDate(it.fim);
  if(!s||!e)return 0;
  const total=e-s;if(total<=0)return 100;
  return Math.max(0,Math.min(100,Math.round(((today-s)/total)*100)));
}
function itemsOnDay(day){
  const filter=document.getElementById('filterStatus')?.value||'';
  return window._items.filter(it=>{
    const s=parseDate(it.inicio),e=parseDate(it.fim)||parseDate(it.inicio);
    if(!s)return false;
    const match=sameDay(s,day)||(s<=day&&e>=day);
    if(filter&&it.status!==filter)return false;
    return match;
  });
}

// ── ALERTAS ──
function checkAlerts(){
  const amanha=addDays(today,1);
  const banner=document.getElementById('alertBanner');
  banner.innerHTML='';
  const vHoje=window._items.filter(it=>it.status!=='ok'&&it.tipo!=='ps'&&parseDate(it.fim)&&sameDay(parseDate(it.fim),today));
  const vAmanha=window._items.filter(it=>it.status!=='ok'&&it.tipo!=='ps'&&parseDate(it.fim)&&sameDay(parseDate(it.fim),amanha));
  let html='';
  vHoje.forEach(it=>{html+=`<div class="alert-card vencido"><div class="alert-body"><div class="alert-title">🚨 VENCE HOJE!</div><div class="alert-text">${it.nome}</div></div><button class="alert-action" onclick="openEdit('${it.id}')">Ver</button><button class="alert-close" onclick="this.closest('.alert-card').remove()">✕</button></div>`;});
  vAmanha.forEach(it=>{html+=`<div class="alert-card"><div class="alert-body"><div class="alert-title">⏰ Vence amanhã</div><div class="alert-text">${it.nome} — ${fmtDate(amanha)}</div></div><button class="alert-action" onclick="openEdit('${it.id}')">Ver</button><button class="alert-close" onclick="this.closest('.alert-card').remove()">✕</button></div>`;});
  if(html){banner.innerHTML=html;banner.classList.add('show');requestAndNotify(vHoje,vAmanha);}
  else banner.classList.remove('show');
}
async function requestAndNotify(hoje,amanha){
  if(!('Notification' in window)||Notification.permission==='denied')return;
  if(Notification.permission!=='granted') await Notification.requestPermission();
  if(Notification.permission!=='granted')return;
  hoje.forEach(it=>new Notification('CMT Agenda — Vence HOJE!',{body:it.nome+' tem prazo hoje.',tag:'v-'+it.id}));
  amanha.forEach(it=>new Notification('CMT Agenda — Vence amanhã',{body:it.nome+' tem prazo amanhã.',tag:'v-'+it.id}));
}

window.saveItem=async function(){

  };

// tooltip
window.showTip=function(e,text){const t=document.getElementById('tooltip');t.textContent=text;t.classList.add('show');moveTip(e);};
function moveTip(e){const t=document.getElementById('tooltip');let x=e.clientX+12,y=e.clientY-t.offsetHeight-14;if(x+240>window.innerWidth)x=e.clientX-244;if(y<0)y=e.clientY+14;t.style.left=x+'px';t.style.top=y+'px';}

// ── MAKE CARD ──
function makeCard(it,mini=false){
  const prog=calcProgress(it);
  const hasObs=it.obs&&it.obs.trim();
  const obs=hasObs?it.obs.replace(/'/g,'').replace(/"/g,''):'';
  const tipAttr=hasObs?`onmouseenter="showTip(event,'${obs}')" onmouseleave="hideTip()"`:'';
  const horaStr=(it.horaInicio?it.horaInicio:'')+(it.horaInicio&&it.horaFim?' → '+it.horaFim:'');
  const isPessoal=it.tipo==='ps';
  const isVt=it.tipo==='vt'||it.status==='vt';
  const statusClass=isPessoal?'ps':isVt?'vt':(it.status||'ag');

  if(mini)return`<div class="mini-card ${statusClass}" onclick="event.stopPropagation();openEdit('${it.id}')" ${tipAttr}>${isPessoal?'🏠 ':isVt?'🔍 ':''} ${it.nome}</div>`;

  return`<div class="card ${statusClass}" onclick="openEdit('${it.id}')" ${tipAttr}>
    ${hasObs?'<span class="card-obs-icon">💬</span>':''}
    <div class="card-name">${isPessoal?'🏠 ':isVt?'🔍 ':''} ${it.nome}</div>
    ${horaStr?`<div class="card-time">⏰ ${horaStr}</div>`:''}
    <div class="card-meta">
      <span class="card-badge">${statusLabel(statusClass)}</span>
      ${isPessoal?'<span class="card-type-badge">Pessoal</span>':''}
    </div>
    ${!isPessoal?`<div class="progress-bar"><div class="progress-fill" style="width:${prog}%"></div></div>`:''}
  </div>`;
}

// ── RENDER ──
window.render=function(){
  if(window._currentView==='week') renderWeek();
  else if(window._currentView==='month') renderMonth();
  else renderYear();
};

function renderWeek(){
  document.getElementById('tarefasSection').style.display='none';
  const sw=startOfWeek(window._currentDate);
  const days=Array.from({length:7},(_,i)=>addDays(sw,i));
  document.getElementById('periodLabel').textContent=`${fmtDate(days[0])} — ${fmtDate(days[6])}`;
  const dn=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

  let h='<div class="week-wrapper">';

  // coluna de horas
  h+='<div class="time-col"><div class="time-col-header"></div>';
  HORAS.forEach(hr=>h+=`<div class="time-slot-label">${hr}</div>`);
  h+='</div>';

  // colunas dos dias
  h+='<div class="week-cols">';
  days.forEach((day,i)=>{
    const isT=sameDay(day,today);
    const isWE=isWeekend(day);
    const isFer=isFeriado(day);
    const ferNome=isFer?getFeriadoNome(isoDate(day)):'';
    const cls=['day-col',isT?'today':'',isWE?'weekend':'',isFer?'feriado':''].filter(Boolean).join(' ');
    const di=itemsOnDay(day);

    h+=`<div class="${cls}">
      <div class="day-header">
        <div class="day-name">${dn[i]}</div>
        <div class="day-num">${day.getDate()}</div>
        ${isFer?`<div class="feriado-label">${ferNome}</div>`:isWE?`<div class="feriado-label">${i===0?'Domingo':'Sábado'}</div>`:''}
      </div>
      <div class="day-slots">`;

    // slots de hora (clicáveis)
    HORAS.forEach(hr=>{
      h+=`<div class="hour-slot" onclick="openNew('${isoDate(day)}','${hr}')"></div>`;
    });

    // cards sobrepostos
    h+=`<div class="day-cards-overlay" style="position:absolute;top:0;left:0;right:0;padding:4px;display:flex;flex-direction:column;gap:4px;pointer-events:none;">`;
    di.forEach(it=>h+=`<div style="pointer-events:all;">${makeCard(it)}</div>`);
    if(!di.length) h+=`<div class="empty-day">clique num horário para adicionar</div>`;
    h+=`</div>`;

    h+=`</div></div>`;
  });

  h+='</div></div>';
  document.getElementById('mainContent').innerHTML=h;

  // ajusta posição relativa dos slots
  document.querySelectorAll('.day-slots').forEach(el=>el.style.position='relative');
}

function renderMonth(){
  document.getElementById('tarefasSection').style.display='block';
  const y=window._currentDate.getFullYear(),m=window._currentDate.getMonth();
  const mn=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  document.getElementById('periodLabel').textContent=`${mn[m]} ${y}`;
  const first=new Date(y,m,1),last=new Date(y,m+1,0),sp=first.getDay();
  const dn=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  let h='<div class="month-grid">';
  dn.forEach(d=>h+=`<div class="month-day-header">${d}</div>`);
  for(let i=0;i<sp;i++){const d=new Date(y,m,-sp+i+1);h+=`<div class="month-cell other-month"><div class="month-cell-num">${d.getDate()}</div></div>`;}
  for(let d=1;d<=last.getDate();d++){
    const day=new Date(y,m,d),isT=sameDay(day,today),di=itemsOnDay(day);
    const isWE=isWeekend(day),isFer=isFeriado(day);
    const ferNome=isFer?getFeriadoNome(isoDate(day)):'';
    const cls=['month-cell',isT?'today':'',isWE?'weekend':'',isFer?'feriado':''].filter(Boolean).join(' ');
    h+=`<div class="${cls}" onclick="openNew('${isoDate(day)}')">
      <div class="month-cell-num">
        ${isT?'<span class="today-dot"></span>':''}${d}
        ${isFer?`<span class="feriado-tag">${ferNome}</span>`:isWE&&!isT?`<span class="feriado-tag">${day.getDay()===0?'Dom':'Sáb'}</span>`:''}
      </div>`;
    di.slice(0,3).forEach(it=>h+=makeCard(it,true));
    if(di.length>3)h+=`<div class="mini-card" style="background:var(--bg);border:none;color:var(--text3)">+${di.length-3} mais</div>`;
    h+=`</div>`;
  }
  const rem=(sp+last.getDate())%7===0?0:7-((sp+last.getDate())%7);
  for(let i=1;i<=rem;i++)h+=`<div class="month-cell other-month"><div class="month-cell-num">${i}</div></div>`;
  h+='</div>';
  document.getElementById('mainContent').innerHTML=h;
}

function renderYear(){
  document.getElementById('tarefasSection').style.display='none';
  const y=window._currentDate.getFullYear();
  document.getElementById('periodLabel').textContent=`${y}`;
  const fn=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const dn2=['D','S','T','Q','Q','S','S'];
  const filter=document.getElementById('filterStatus')?.value||'';
  let h='<div class="year-grid">';
  for(let m=0;m<12;m++){
    const first=new Date(y,m,1),last=new Date(y,m+1,0),sp=first.getDay();
    const ec=window._items.filter(it=>{
      if(filter&&it.status!==filter)return false;
      const s=parseDate(it.inicio),e=parseDate(it.fim)||parseDate(it.inicio);
      if(!s)return false;
      return(s.getFullYear()===y&&s.getMonth()===m)||(e&&e.getFullYear()===y&&e.getMonth()===m);
    }).length;
    h+=`<div class="mini-month"><div class="mini-month-title">${fn[m]}${ec?`<span class="counter-chip">${ec}</span>`:''}</div><div class="mini-month-grid">`;
    dn2.forEach(d=>h+=`<div class="mini-day-name">${d}</div>`);
    for(let i=0;i<sp;i++)h+=`<div></div>`;
    for(let d=1;d<=last.getDate();d++){
      const day=new Date(y,m,d),isT=sameDay(day,today),hasEv=itemsOnDay(day).length>0;
      const isWE=isWeekend(day)||isFeriado(day);
      h+=`<div class="mini-day${isT?' today-mini':''}${hasEv&&!isT?' has-event':''}${isWE&&!isT?' weekend-mini':''}"
        onclick="window._currentDate=new Date(${y},${m},${d});setView('week')"
        title="${fmtDate(day)}">${d}</div>`;
    }
    h+=`</div></div>`;
  }
  h+='</div>';
  document.getElementById('mainContent').innerHTML=h;
}


// ── TAREFAS ──
window._tarefasFilter = 'all';
const tarefasRef = collection(db, 'tarefas');
window._tarefas = [];

onSnapshot(tarefasRef, snap => {
  window._tarefas = snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>b.createdAt-a.createdAt);
  renderTarefas();
});

window.addTarefa = async function(){
  const inp = document.getElementById('tarefaInput');
  const texto = inp.value.trim();
  if(!texto) return;
  const now = new Date();
  const dataLabel = now.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  await addDoc(tarefasRef, {texto, dataLabel, done:false, createdAt:Date.now()});
  inp.value = '';
  inp.focus();
};

window.toggleTarefa = async function(id, done){
  await updateDoc(doc(db,'tarefas',id), {done:!done});
};

window.filterTarefas = function(f){
  window._tarefasFilter = f;
  ['all','pend','done'].forEach(k=>{
    document.getElementById('tf'+k.charAt(0).toUpperCase()+k.slice(1))?.classList.toggle('active', k===f);
  });
  renderTarefas();
};

function renderTarefas(){
  const list = document.getElementById('tarefasList');
  const badge = document.getElementById('tarefasBadge');
  const count = document.getElementById('tarefasCount');
  if(!list) return;

  const f = window._tarefasFilter;
  const all = window._tarefas;
  const pendentes = all.filter(t=>!t.done).length;
  const concluidas = all.filter(t=>t.done).length;
  const filtered = f==='pend'?all.filter(t=>!t.done):f==='done'?all.filter(t=>t.done):all;

  badge.textContent = pendentes;
  count.textContent = `${pendentes} pendente${pendentes!==1?'s':''} · ${concluidas} concluída${concluidas!==1?'s':''}`;

  list.innerHTML = filtered.map(t=>`
    <div class="tarefa-item${t.done?' done':''}">
      <input type="checkbox" class="tarefa-check" ${t.done?'checked':''} onchange="toggleTarefa('${t.id}',${t.done})">
      <div class="tarefa-body">
        <div class="tarefa-texto">${t.texto}</div>
        <div class="tarefa-data">📅 ${t.dataLabel||''}</div>
      </div>
    </div>
  `).join('') || '<div style="text-align:center;padding:20px;color:var(--text3);font-size:12px;">Nenhuma tarefa aqui.</div>';
}


document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
