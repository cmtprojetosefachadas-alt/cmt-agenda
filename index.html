<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMT — Anotações</title>
<meta name="theme-color" content="#d4541a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CMT Notas">
<link rel="manifest" id="manifestLink">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f0ede8; --surface:#fff; --surface2:#faf9f7; --border:#e2ddd7;
    --text:#1a1714; --text2:#6b6560; --text3:#9c9690;
    --accent:#d4541a; --accent-light:#fdeee6;
    --dark:#1e293b; --dark2:#334155;
    --shadow:0 1px 3px rgba(0,0,0,.07),0 4px 12px rgba(0,0,0,.05);
    --shadow-lg:0 8px 32px rgba(0,0,0,.12);
    --radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  /* SYNC */
  #syncBar{display:none;position:fixed;top:0;left:0;right:0;height:3px;background:var(--border);z-index:9999;}
  #syncBar.show{display:block;}
  #syncFill{height:100%;width:0%;background:var(--accent);transition:width .4s;animation:pulse 1.2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

  /* ONLINE */
  #onlineChip{position:fixed;bottom:16px;right:16px;padding:6px 12px;border-radius:20px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:5px;box-shadow:var(--shadow-lg);z-index:500;}
  #onlineChip.online{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;}
  #onlineChip.offline{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;}
  #onlineDot{width:7px;height:7px;border-radius:50%;}
  #onlineChip.online #onlineDot{background:#16a34a;}
  #onlineChip.offline #onlineDot{background:#dc2626;}

  /* LOADING */
  #loadingScreen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9000;gap:16px;}
  #loadingScreen.hide{display:none;}
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* HEADER */
  header{background:var(--dark);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2);}
  .logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px;color:#fff;letter-spacing:-.3px;}
  .logo-icon{width:36px;height:36px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;}
  .logo-sub{color:rgba(255,255,255,.5);font-weight:400;font-size:13px;}
  .header-stats{display:flex;gap:16px;align-items:center;}
  .stat-chip{background:rgba(255,255,255,.1);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;color:rgba(255,255,255,.8);font-family:'JetBrains Mono',monospace;}
  .stat-chip span{color:#fff;}

  /* TOOLBAR */
  .toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;position:sticky;top:64px;z-index:99;box-shadow:0 1px 0 var(--border);}
  .search-box{flex:1;min-width:160px;position:relative;}
  .search-box input{width:100%;padding:9px 12px 9px 36px;border-radius:9px;border:1.5px solid var(--border);font-family:'Sora',sans-serif;font-size:13px;background:var(--bg);color:var(--text);outline:none;transition:border .15s;}
  .search-box input:focus{border-color:var(--accent);background:#fff;}
  .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;}
  .filter-group{display:flex;gap:8px;align-items:center;}
  .filter-select{padding:8px 12px;border-radius:9px;border:1.5px solid var(--border);font-family:'Sora',sans-serif;font-size:12px;color:var(--text2);background:var(--bg);outline:none;cursor:pointer;transition:border .15s;}
  .filter-select:focus{border-color:var(--accent);}
  .filter-date{padding:8px 10px;border-radius:9px;border:1.5px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text2);background:var(--bg);outline:none;cursor:pointer;}
  .filter-date:focus{border-color:var(--accent);}
  .btn-clear{padding:8px 12px;border-radius:9px;border:1.5px solid var(--border);background:transparent;font-family:'Sora',sans-serif;font-size:12px;font-weight:500;color:var(--text3);cursor:pointer;transition:all .12s;white-space:nowrap;}
  .btn-clear:hover{color:var(--accent);border-color:var(--accent);}

  /* MAIN */
  main{max-width:820px;margin:0 auto;padding:24px 20px 100px;}

  /* ADD CARD */
  .add-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:20px;margin-bottom:20px;box-shadow:var(--shadow);}
  .add-card-title{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:12px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.4px;}
  .add-textarea{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid var(--border);font-family:'Sora',sans-serif;font-size:14px;background:var(--bg);color:var(--text);outline:none;resize:none;min-height:80px;transition:border .15s;line-height:1.6;}
  .add-textarea:focus{border-color:var(--accent);background:#fff;}
  .add-footer{display:flex;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap;}
  .add-tag-select{padding:8px 12px;border-radius:8px;border:1.5px solid var(--border);font-family:'Sora',sans-serif;font-size:12px;color:var(--text2);background:var(--bg);outline:none;cursor:pointer;}
  .add-tag-select:focus{border-color:var(--accent);}

  /* FILE UPLOAD */
  .file-upload-area{display:flex;align-items:center;gap:8px;}
  .file-upload-btn{padding:7px 12px;border-radius:8px;border:1.5px dashed var(--border);background:var(--bg);font-family:'Sora',sans-serif;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;}
  .file-upload-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
  #fileInput{display:none;}
  .file-preview{font-size:11px;color:var(--text2);background:var(--bg);border-radius:6px;padding:4px 8px;border:1px solid var(--border);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .file-preview.uploading{color:var(--accent);animation:pulse 1s infinite;}

  .btn-add{margin-left:auto;padding:9px 22px;border-radius:9px;border:none;background:var(--accent);color:#fff;font-family:'Sora',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px;}
  .btn-add:hover{background:#b8450f;transform:translateY(-1px);}
  .btn-add:disabled{background:var(--border);cursor:not-allowed;transform:none;}

  /* SECTION HEADERS */
  .section-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin:20px 0 8px;display:flex;align-items:center;gap:8px;}
  .section-label::after{content:'';flex:1;height:1px;background:var(--border);}

  /* NOTE CARD */
  .note-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:16px 18px;margin-bottom:10px;transition:all .15s;position:relative;}
  .note-card:hover{box-shadow:var(--shadow);}
  .note-card.done{border-left:3px solid #16a34a;background:#fafff9;}
  .note-card.done .note-text{text-decoration:line-through;color:var(--text3);}

  .note-top{display:flex;align-items:flex-start;gap:12px;}
  .note-check{width:18px;height:18px;flex-shrink:0;cursor:pointer;accent-color:var(--dark);margin-top:3px;}
  .note-body{flex:1;min-width:0;}
  .note-text{font-size:14px;font-weight:500;color:var(--text);line-height:1.6;margin-bottom:6px;white-space:pre-wrap;word-break:break-word;}
  .note-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .note-date{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text3);}
  .note-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.3px;}
  .tag-geral{background:#f1f5f9;color:#475569;}
  .tag-urgente{background:#fef2f2;color:#dc2626;}
  .tag-cliente{background:#eff6ff;color:#2563eb;}
  .tag-financeiro{background:#f0fdf4;color:#16a34a;}
  .tag-pessoal{background:#ecfeff;color:#0891b2;}
  .tag-obra{background:#fef9c3;color:#b45309;}

  /* ATTACHMENT */
  .note-attachment{margin-top:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .attach-link{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);font-size:12px;font-weight:500;color:var(--dark);text-decoration:none;transition:all .15s;max-width:240px;}
  .attach-link:hover{background:var(--dark);color:#fff;border-color:var(--dark);}
  .attach-icon{font-size:14px;flex-shrink:0;}
  .attach-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

  /* EMPTY STATE */
  .empty-state{text-align:center;padding:60px 20px;color:var(--text3);}
  .empty-icon{font-size:48px;margin-bottom:12px;}
  .empty-title{font-size:16px;font-weight:600;color:var(--text2);margin-bottom:6px;}
  .empty-sub{font-size:13px;}

  /* UPLOAD PROGRESS */
  .upload-progress{height:3px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden;display:none;}
  .upload-progress.show{display:block;}
  .upload-bar{height:100%;background:var(--accent);border-radius:2px;width:0%;transition:width .3s;}

  @media(max-width:600px){
    header{padding:0 16px;}
    .toolbar{padding:10px 16px;}
    main{padding:16px 12px 100px;}
    .header-stats{display:none;}
    .add-card{padding:14px;}
    .filter-group{width:100%;}
  }
</style>
</head>
<body>

<div id="syncBar"><div id="syncFill"></div></div>

<!-- LOGIN -->
<div id="loginScreen" style="position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:99999;">
  <div style="background:#fff;border-radius:20px;padding:40px 36px;width:340px;max-width:92vw;box-shadow:var(--shadow-lg);text-align:center;">
    <div style="width:56px;height:56px;background:var(--accent);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 20px;">📋</div>
    <div style="font-size:18px;font-weight:700;margin-bottom:4px;">CMT Anotações</div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:24px;">Notas, tarefas e documentos</div>
    <input type="password" id="loginInput" placeholder="Digite a senha"
      style="width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid var(--border);font-family:'Sora',sans-serif;font-size:14px;background:var(--bg);color:var(--text);outline:none;text-align:center;letter-spacing:2px;margin-bottom:8px;"
      onkeydown="if(event.key==='Enter')doLogin()"
      onfocus="this.style.borderColor='var(--accent)'"
      onblur="this.style.borderColor='var(--border)'">
    <div id="loginError" style="font-size:11px;color:#dc2626;margin-bottom:8px;min-height:16px;"></div>
    <button onclick="doLogin()" style="width:100%;padding:12px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-family:'Sora',sans-serif;font-size:14px;font-weight:600;cursor:pointer;">Entrar</button>
  </div>
</div>
<script>
function doLogin(){
  var v=document.getElementById('loginInput').value;
  if(v==='cmt2026'){document.getElementById('loginScreen').style.display='none';sessionStorage.setItem('cmt_auth','1');}
  else{var e=document.getElementById('loginError');e.textContent='Senha incorreta.';document.getElementById('loginInput').value='';document.getElementById('loginInput').focus();setTimeout(function(){e.textContent='';},2500);}
}
if(sessionStorage.getItem('cmt_auth')==='1'){document.getElementById('loginScreen').style.display='none';}
else{setTimeout(function(){document.getElementById('loginInput').focus();},200);}
</script>

<div id="loadingScreen">
  <div style="width:48px;height:48px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;">📋</div>
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--text3);font-weight:500;">Carregando anotações...</div>
</div>

<div id="onlineChip" class="online">
  <div id="onlineDot"></div>
  <span id="onlineText">Online</span>
</div>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon">📋</div>
    CMT <span class="logo-sub">&nbsp;/ Anotações</span>
  </div>
  <div class="header-stats">
    <div class="stat-chip">📝 <span id="statTotal">0</span> notas</div>
    <div class="stat-chip">✅ <span id="statDone">0</span> concluídas</div>
    <div class="stat-chip">⏳ <span id="statPend">0</span> pendentes</div>
  </div>
</header>

<!-- TOOLBAR FILTROS -->
<div class="toolbar">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Buscar por nome ou conteúdo..." oninput="applyFilters()">
  </div>
  <div class="filter-group">
    <select class="filter-select" id="filterMes" onchange="applyFilters()">
      <option value="">Todos os meses</option>
      <option value="01">Janeiro</option><option value="02">Fevereiro</option>
      <option value="03">Março</option><option value="04">Abril</option>
      <option value="05">Maio</option><option value="06">Junho</option>
      <option value="07">Julho</option><option value="08">Agosto</option>
      <option value="09">Setembro</option><option value="10">Outubro</option>
      <option value="11">Novembro</option><option value="12">Dezembro</option>
    </select>
    <input type="date" class="filter-date" id="filterData" onchange="applyFilters()">
    <select class="filter-select" id="filterTag" onchange="applyFilters()">
      <option value="">Todas as categorias</option>
      <option value="geral">Geral</option>
      <option value="urgente">Urgente</option>
      <option value="cliente">Cliente</option>
      <option value="financeiro">Financeiro</option>
      <option value="pessoal">Pessoal</option>
      <option value="obra">Obra</option>
    </select>
    <select class="filter-select" id="filterStatus" onchange="applyFilters()">
      <option value="">Todas</option>
      <option value="pend">Pendentes</option>
      <option value="done">Concluídas</option>
    </select>
    <button class="btn-clear" onclick="clearFilters()">✕ Limpar</button>
  </div>
</div>

<!-- MAIN -->
<main>
  <!-- ADD NOTE -->
  <div class="add-card">
    <div class="add-card-title">✏️ Nova anotação</div>
    <textarea class="add-textarea" id="noteInput" placeholder="Digite sua anotação, tarefa ou observação..." rows="3"></textarea>
    <div class="upload-progress" id="uploadProgress"><div class="upload-bar" id="uploadBar"></div></div>
    <div class="add-footer">
      <select class="add-tag-select" id="noteTag">
        <option value="geral">📌 Geral</option>
        <option value="urgente">🔴 Urgente</option>
        <option value="cliente">🔵 Cliente</option>
        <option value="financeiro">🟢 Financeiro</option>
        <option value="pessoal">🔵 Pessoal</option>
        <option value="obra">🟡 Obra</option>
      </select>
      <div class="file-upload-area">
        <label class="file-upload-btn" for="fileInput">
          📎 Anexar arquivo
        </label>
        <input type="file" id="fileInput" accept=".pdf,.png,.jpg,.jpeg,.doc,.docx,.xls,.xlsx" onchange="handleFileSelect(this)">
        <span class="file-preview" id="filePreview" style="display:none"></span>
      </div>
      <button class="btn-add" id="btnAdd" onclick="addNote()">
        + Salvar
      </button>
    </div>
  </div>

  <!-- NOTES LIST -->
  <div id="notesList"></div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, enableIndexedDbPersistence }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytesResumable, getDownloadURL }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyBhL6GZt4KMxpozfAtHuzsW-Wqk_Hj_j2I",
  authDomain: "cmt-agenda.firebaseapp.com",
  projectId: "cmt-agenda",
  storageBucket: "cmt-agenda.firebasestorage.app",
  messagingSenderId: "181925379452",
  appId: "1:181925379452:web:0746721aabdb972a31f8f9"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const storage = getStorage(fbApp);
enableIndexedDbPersistence(db).catch(e=>console.warn('Persist:',e.code));

// online
function setOnline(v){const c=document.getElementById('onlineChip');document.getElementById('onlineText').textContent=v?'Online':'Offline';c.className=v?'online':'offline';}
window.addEventListener('online',()=>setOnline(true));
window.addEventListener('offline',()=>setOnline(false));
setOnline(navigator.onLine);

// sync
function syncStart(){document.getElementById('syncBar').classList.add('show');document.getElementById('syncFill').style.width='60%';}
function syncEnd(){document.getElementById('syncFill').style.width='100%';setTimeout(()=>{document.getElementById('syncBar').classList.remove('show');document.getElementById('syncFill').style.width='0%';},400);}

// data
window._notes = [];
window._selectedFile = null;
const colRef = collection(db, 'anotacoes');

onSnapshot(colRef, snap => {
  window._notes = snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>b.createdAt-a.createdAt);
  document.getElementById('loadingScreen').classList.add('hide');
  updateStats();
  applyFilters();
});

// stats
function updateStats(){
  const all = window._notes;
  document.getElementById('statTotal').textContent = all.length;
  document.getElementById('statDone').textContent = all.filter(n=>n.done).length;
  document.getElementById('statPend').textContent = all.filter(n=>!n.done).length;
}

// file select
window.handleFileSelect = function(input){
  const file = input.files[0];
  if(!file) return;
  window._selectedFile = file;
  const prev = document.getElementById('filePreview');
  prev.textContent = file.name;
  prev.style.display = 'inline-block';
};

// add note
window.addNote = async function(){
  const texto = document.getElementById('noteInput').value.trim();
  if(!texto){document.getElementById('noteInput').focus();return;}

  const btn = document.getElementById('btnAdd');
  btn.disabled = true;
  btn.textContent = 'Salvando...';

  const now = new Date();
  const isoStr = now.toISOString().slice(0,10); // para filtro por data
  const mes = isoStr.slice(5,7); // para filtro por mês
  const dataLabel = now.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'})
    + ' às ' + now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  const tag = document.getElementById('noteTag').value;

  let anexo = null;

  // upload arquivo se tiver
  if(window._selectedFile){
    try{
      const file = window._selectedFile;
      const fileRef = ref(storage, `anotacoes/${Date.now()}_${file.name}`);
      const prog = document.getElementById('uploadProgress');
      const bar  = document.getElementById('uploadBar');
      prog.classList.add('show');

      await new Promise((resolve, reject) => {
        const task = uploadBytesResumable(fileRef, file);
        task.on('state_changed',
          snap => { bar.style.width = (snap.bytesTransferred/snap.totalBytes*100)+'%'; },
          reject,
          async () => {
            const url = await getDownloadURL(task.snapshot.ref);
            anexo = { nome: file.name, url, tipo: file.type };
            resolve();
          }
        );
      });
      prog.classList.remove('show');
      bar.style.width = '0%';
    }catch(e){
      console.error('Upload erro:',e);
      alert('Erro ao fazer upload. Tente novamente.');
      btn.disabled=false; btn.textContent='+ Salvar'; return;
    }
  }

  syncStart();
  try{
    await addDoc(colRef, {
      texto, tag, isoStr, mes, dataLabel,
      done: false,
      createdAt: Date.now(),
      ...(anexo ? {anexo} : {})
    });
  }catch(e){console.error(e);}
  syncEnd();

  // reset
  document.getElementById('noteInput').value = '';
  document.getElementById('noteTag').value = 'geral';
  document.getElementById('fileInput').value = '';
  document.getElementById('filePreview').style.display = 'none';
  window._selectedFile = null;
  btn.disabled=false; btn.textContent='+ Salvar';
};

// toggle done
window.toggleNote = async function(id, done){
  syncStart();
  try{ await updateDoc(doc(db,'anotacoes',id),{done:!done}); }catch(e){console.error(e);}
  syncEnd();
};

// filtros
window.applyFilters = function(){
  const q    = document.getElementById('searchInput').value.toLowerCase().trim();
  const mes  = document.getElementById('filterMes').value;
  const data = document.getElementById('filterData').value;
  const tag  = document.getElementById('filterTag').value;
  const st   = document.getElementById('filterStatus').value;

  let filtered = window._notes.filter(n => {
    if(q && !n.texto.toLowerCase().includes(q)) return false;
    if(mes && n.mes !== mes) return false;
    if(data && n.isoStr !== data) return false;
    if(tag && n.tag !== tag) return false;
    if(st==='pend' && n.done) return false;
    if(st==='done' && !n.done) return false;
    return true;
  });

  renderNotes(filtered);
};

window.clearFilters = function(){
  document.getElementById('searchInput').value = '';
  document.getElementById('filterMes').value = '';
  document.getElementById('filterData').value = '';
  document.getElementById('filterTag').value = '';
  document.getElementById('filterStatus').value = '';
  applyFilters();
};

// render
function tagLabel(t){
  return {geral:'📌 Geral',urgente:'🔴 Urgente',cliente:'🔵 Cliente',financeiro:'🟢 Financeiro',pessoal:'🔵 Pessoal',obra:'🟡 Obra'}[t]||t;
}

function fileIcon(tipo){
  if(!tipo) return '📎';
  if(tipo.includes('pdf')) return '📄';
  if(tipo.includes('image')) return '🖼️';
  if(tipo.includes('word')||tipo.includes('doc')) return '📝';
  if(tipo.includes('sheet')||tipo.includes('excel')||tipo.includes('xls')) return '📊';
  return '📎';
}

function renderNotes(notes){
  const list = document.getElementById('notesList');

  if(!notes.length){
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📭</div>
      <div class="empty-title">Nenhuma anotação encontrada</div>
      <div class="empty-sub">Tente outros filtros ou adicione uma nova nota acima</div>
    </div>`;
    return;
  }

  // agrupa por data
  const groups = {};
  notes.forEach(n => {
    const key = n.isoStr || '0000-00-00';
    if(!groups[key]) groups[key]=[];
    groups[key].push(n);
  });

  const sortedKeys = Object.keys(groups).sort((a,b)=>b.localeCompare(a));
  let html = '';

  sortedKeys.forEach(key => {
    // label bonito da data
    let dateLabel = key;
    try{
      const [y,m,d] = key.split('-').map(Number);
      const dt = new Date(y,m-1,d);
      const today = new Date(); today.setHours(0,0,0,0);
      const diff = Math.round((today-dt)/86400000);
      if(diff===0) dateLabel='Hoje';
      else if(diff===1) dateLabel='Ontem';
      else dateLabel = dt.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
    }catch(e){}

    html += `<div class="section-label">${dateLabel}</div>`;

    groups[key].forEach(n => {
      const anexoHtml = n.anexo
        ? `<div class="note-attachment">
            <a class="attach-link" href="${n.anexo.url}" target="_blank" rel="noopener">
              <span class="attach-icon">${fileIcon(n.anexo.tipo)}</span>
              <span class="attach-name">${n.anexo.nome}</span>
              <span style="font-size:10px;opacity:.6;margin-left:4px;">↗</span>
            </a>
           </div>`
        : '';

      html += `<div class="note-card${n.done?' done':''}">
        <div class="note-top">
          <input type="checkbox" class="note-check" ${n.done?'checked':''} onchange="toggleNote('${n.id}',${n.done})">
          <div class="note-body">
            <div class="note-text">${escHtml(n.texto)}</div>
            <div class="note-meta">
              <span class="note-date">🕐 ${n.dataLabel||''}</span>
              <span class="note-tag tag-${n.tag||'geral'}">${tagLabel(n.tag||'geral')}</span>
            </div>
            ${anexoHtml}
          </div>
        </div>
      </div>`;
    });
  });

  list.innerHTML = html;
}

function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Enter para salvar (Shift+Enter = nova linha)
document.getElementById('noteInput').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addNote();}
});

// PWA manifest
const manifest={name:"CMT Anotações",short_name:"CMT Notas",start_url:"./index.html",display:"standalone",background_color:"#f0ede8",theme_color:"#d4541a"};
const blob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
document.getElementById('manifestLink').href=URL.createObjectURL(blob);
</script>
